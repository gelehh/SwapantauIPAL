<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Swapantau Limbah Cair</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      background: #f4f7f6; /* Warna background abu-abu terang modern */
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #475569;
    }
    .form-container {
      max-width: 850px;
      margin: 50px auto;
      padding: 0 15px;
    }
    .card {
      border: none;
      border-radius: 24px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08);
      background: #ffffff;
      overflow: hidden;
    }
    .card-header {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      padding: 40px 25px;
      border-bottom: none;
    }
    .card-header h3 {
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.5px;
      font-size: 2rem;
    }
    .section-title {
      color: #0f172a;
      font-size: 1.15rem;
      font-weight: 700;
      margin-top: 25px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title i {
      color: #10b981;
      background: rgba(16, 185, 129, 0.15);
      padding: 10px;
      border-radius: 12px;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 2px;
      background: #f1f5f9;
      border-radius: 2px;
    }
    .form-floating > label {
      color: #64748b;
      padding-left: 1.25rem;
      font-weight: 500;
    }
    .form-control {
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      padding: 1rem 1.25rem;
      height: calc(3.8rem + 2px);
      background-color: #f8fafc;
      font-weight: 600;
      color: #0f172a;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      border-color: #10b981;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
    }
    .btn-submit {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
      margin-top: 15px;
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.5);
      color: white;
    }
    .icon-label {
      width: 24px;
      text-align: center;
      margin-right: 8px;
      color: #10b981;
    }
    .copyright {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 20px;
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="container form-container">
    <div class="card">
      <div class="card-header text-center">
        <h3 class="mb-2"><i class="fas fa-leaf me-2"></i>Swapantau Limbah Cair</h3>
        <p class="mb-0 text-white opacity-75 fw-medium">Formulir Input Data Lapangan IPAL</p>
      </div>
      
      <div class="card-body p-4 p-md-5">
        
        <div id="alert" class="alert alert-success d-none align-items-center" role="alert" style="border-radius: 14px; font-weight: 600;">
          <i class="fas fa-check-circle me-2 fs-4"></i>
          <div>Data berhasil dikirim ke sistem!</div>
        </div>
        
        <form id="formLimbah" name="form-limbah">
          
          <div class="section-title">
            <i class="fas fa-id-badge"></i> Informasi Umum
          </div>
          <div class="row g-4 mb-2">
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" class="form-control" id="nama" name="nama" placeholder="Nama Pemeriksa" required>
                <label for="nama"><i class="fas fa-user icon-label"></i>Nama Pemeriksa</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input type="date" class="form-control" id="tanggal" name="tanggal" placeholder="Tanggal" required>
                <label for="tanggal"><i class="fas fa-calendar-alt icon-label"></i>Tanggal Pengecekan</label>
              </div>
            </div>
          </div>

          <div class="section-title">
            <i class="fas fa-vial"></i> Parameter Utama
          </div>
          <div class="row g-4 mb-2">
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.01" class="form-control" id="ph" name="ph" placeholder="pH" required>
                <label for="ph"><i class="fas fa-tint icon-label"></i>Kadar pH</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="suhu" name="suhu" placeholder="Suhu" required>
                <label for="suhu"><i class="fas fa-thermometer-half icon-label"></i>Suhu (°C)</label>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="tds" name="tds" placeholder="TDS" required>
                <label for="tds"><i class="fas fa-water icon-label"></i>TDS (mg/L)</label>
              </div>
            </div>
          </div>

          <div class="section-title">
            <i class="fas fa-water"></i> Pengecekan Debit
          </div>
          <div class="row g-4 mb-4">
            <div class="col-md-6 col-6">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_masuk" name="debit_masuk" placeholder="Debit Masuk" required>
                <label for="debit_masuk"><i class="fas fa-arrow-right icon-label"></i>Debit Masuk</label>
              </div>
            </div>
            <div class="col-md-6 col-6">
              <div class="form-floating">
                <input type="number" step="0.1" class="form-control" id="debit_keluar" name="debit_keluar" placeholder="Debit Keluar" required>
                <label for="debit_keluar"><i class="fas fa-arrow-left icon-label"></i>Debit Keluar</label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn w-100 btn-submit text-white" id="btnSubmit">
            <i class="fas fa-paper-plane me-2"></i>KIRIM DATA LAPORAN
          </button>
          
        </form>
      </div>
    </div>
    
    <div class="copyright">
      &copy; Copyright by Bg
    </div>

  </div>

  <script>
    // KODINGAN JAVASCRIPT INI SAMA SEKALI TIDAK DIGANTI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyOdcrkuzda7vdAGIusyxDK3H_HlDF_DzyjzHN98yQCS6CsOWExes9tLGPzgl6XzEMHZA/exec'; 
    
    const form = document.forms['form-limbah'];
    const btnSubmit = document.getElementById('btnSubmit');
    const alertBox = document.getElementById('alert');

    document.getElementById('tanggal').valueAsDate = new Date();

    form.addEventListener('submit', e => {
      e.preventDefault();
      
      btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Mengirim...';
      btnSubmit.disabled = true;

      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
          alertBox.classList.remove('d-none');
          alertBox.classList.add('d-flex');
          
          form.reset();
          document.getElementById('tanggal').valueAsDate = new Date(); 
          btnSubmit.innerHTML = '<i class="fas fa-paper-plane me-2"></i>KIRIM DATA LAPORAN';
          btnSubmit.disabled = false;
          
          setTimeout(() => {
            alertBox.classList.add('d-none');
            alertBox.classList.remove('d-flex');
          }, 4000);
        })
        .catch(error => {
          console.error('Error!', error.message);
          alert('Terjadi kesalahan saat mengirim data. Silakan coba lagi.');
          btnSubmit.innerHTML = '<i class="fas fa-paper-plane me-2"></i>KIRIM DATA LAPORAN';
          btnSubmit.disabled = false;
        });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
